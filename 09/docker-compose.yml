services:
  nextcloud-lamp:
    image: matray/lamp:latest-php8
    container_name: nextcloud-lamp
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
      - MYSQL_ROOT_PASSWORD=${PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=${PASSWORD}
    volumes:
      - ${DATA}:/var/www/html    # Onde colocas os ficheiros do Nextcloud
      - ${DB_PATH}:/var/lib/mysql # Onde fica a base de dados
      - ${REMOTE}:/data          # O teu mount do Rclone
    ports:
      - "8081:80"
    networks:
      - web_network

networks:
  web_network:
    external: true
