###############################################################################################################################
# Como as imagens do nextcloud tem dado erros, optei por arrancar com uma versao mais leve, e correr tudo dentro do container #
###############################################################################################################################
services:
  nextcloud-all-in-one:
    image: ubuntu:22.04
    container_name: nextcloud-universal
    restart: always
    tty: true
    stdin_open: true
    environment:
      - TZ=Europe/Lisbon
    volumes:
      - ${DATA}:/var/www/html        # Onde vai ficar o Nextcloud
      - ${DB_PATH}:/var/lib/mysql     # Onde vai ficar a base de dados
      - ${REMOTE}:/mnt/rclone        # O teu mount do Rclone
    ports:
      - "8081:80"
    networks:
      - web_network

networks:
  web_network:
    external: true
