services:
  snappymail:
    image: ajanvier/snappymail:latest
    container_name: snappymail
    restart: always
    networks:
      - web_network
    volumes:
      # Utilizando a variável de ambiente para o mapeamento local
      - ${DATA}:/var/www/snappymail/data
    environment:
      - TZ=Europe/Lisbon
      - UPLOAD_MAX_SIZE=50M
      - MEMORY_LIMIT=256M
    # Porta interna padrão desta imagem
    expose:
      - "80:80"

networks:
  web_network:
    external: true
