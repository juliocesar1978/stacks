services:
  snappymail:
    image: wildbeast/snappymail:latest
    container_name: snappymail
    restart: always
    networks:
      - web_network
    volumes:
      - ${DATA}:/var/www/snappymail/data
    environment:
      - TZ=Europe/Lisbon
    # Esta imagem costuma usar a porta 80
    expose:
      - "80"
    # Descomenta abaixo se quiseres testar direto no IP:8888
    # ports:
    #   - "8888:80"

networks:
  web_network:
    external: true
