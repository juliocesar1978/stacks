services:
  snappymail:
    # Esta imagem é mantida e testada especificamente para ARM64
    image: lscr.io/linuxserver/snappymail:latest
    container_name: snappymail
    restart: always
    networks:
      - web_network
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - ${DATA}:/config
    expose:
      - "80"
    # Se quiseres testar fora do NPM primeiro, descomenta as 2 linhas abaixo:
    # ports:
    #   - "8888:80"

networks:
  web_network:
    external: true
