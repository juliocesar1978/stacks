services:
  snappymail:
    image: ajanvier/snappymail:latest
    container_name: snappymail
    restart: always
    networks:
      - web_network
    volumes:
      - ${DATA}:/var/www/snappymail/data
    environment:
      - TZ=Europe/Lisbon
      - UPLOAD_MAX_SIZE=50M
      - MEMORY_LIMIT=256M
    # Alterado de expose para ports para teste
    ports:
      - "8888:80" 

networks:
  web_network:
    external: true
