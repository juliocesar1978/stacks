services:
  rainloop:
    image: rainloop/rainloop:latest
    container_name: rainloop
    restart: always
    networks:
      - web_network
    volumes:
      - ${DATA}:/var/www/rainloop/data
    # Esta imagem corre na porta 80 por padrão
    expose:
      - "80"
    ports:
      - "8888:80"

networks:
  web_network:
    external: true
