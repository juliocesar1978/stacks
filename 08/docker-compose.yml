services:
  snappymail:
    image: lscr.io/linuxserver/snappymail:latest
    container_name: snappymail
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Lisbon
    volumes:
      - ${DATA}:/config
    ports:
      - "8888:80"
    networks:
      - web_network

networks:
  web_network:
    external: true
